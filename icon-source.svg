<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C1665B"/>
      <stop offset="100%" stop-color="#D4836E"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="54" cy="54" r="48" fill="url(#bg)"/>
  <!-- 经纬线 -->
  <ellipse cx="54" cy="54" rx="45" ry="18" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="54" cy="54" rx="45" ry="45" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.4"/>
  <line x1="9" y1="54" x2="99" y2="54" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <!-- 竖经线 -->
  <ellipse cx="54" cy="54" rx="16" ry="45" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.4"/>
  <!-- 时钟指针 -->
  <line x1="54" y1="54" x2="54" y2="32" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="54" y1="54" x2="72" y2="46" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="54" cy="54" r="3.5" fill="#fff"/>
</svg>
